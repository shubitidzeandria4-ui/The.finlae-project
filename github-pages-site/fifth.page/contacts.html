<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Fight Club</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../first.page/css/index.css">
</head>
<body>
    <header class="topbar">
        <div class="brand">
            <a href="../index.html" class="logo">Fight Club</a>
            <span class="subline">underground | visceral | unforgettable</span>
        </div>
        <nav>
            <ul class="nav-list">
                <li class="home"><a href="../index.html">Home</a></li>
                <li><a href="../about.html">About</a></li>
                <li><a href="../third.page/services.html">Services</a></li>
                <li><a href="../fourth.page/news.html">News</a></li>
                <li><a href="./contacts.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section class="contact-section">
        <div class="container">
            <h1>Contact Us</h1>
            <p>If you have any questions, feel free to reach out!</p>
            <form>
                <div class="mb-3">
                    <label for="name" class="form-label">Name</label>
                    <input type="text" class="form-control" id="name" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" required>
                </div>
                <div class="mb-3">
                    <label for="message" class="form-label">Message</label>
                    <textarea class="form-control" id="message" rows="4" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Send Message</button>
            </form>
        </div>
    </section>

    <footer class="footer">
        <div class="footer-container">
            <div class="footer-box footer-left">
                <p class="copyright">© 2026 Fight Club x Geolab. All rights reserved.</p>
            </div>
            <div class="footer-box footer-center">
                <a href="https://www.tbceducation.ge/" class="footer-logo" target="_blank">
                    <img src="../first.page/images/თიბისი.png" alt="TBC Logo">
                </a>
            </div>
            <div class="footer-box footer-right">
                <div class="social-icons">
                    <a href="https://github.com" class="social-icon" target="_blank">
                        <i class="fab fa-github"></i>
                    </a>
                    <a href="https://facebook.com" class="social-icon" target="_blank">
                        <i class="fab fa-facebook"></i>
                    </a>
                    <a href="https://instagram.com" class="social-icon" target="_blank">
                        <i class="fab fa-instagram"></i>
                    </a>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../src/main.js"></script>
</body>
</html>
